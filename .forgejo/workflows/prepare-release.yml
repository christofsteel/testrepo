name: Create a release

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Type of Release"
        required: true
        type: choice
        options:
          - stable
          - dev

jobs:
  update-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"      
      - name: check out repo
        uses: actions/checkout@v4
      - name: get current version
        run: |
          REPO_VERSION=$(uv version --short)
          echo "REPO_VERSION=${REPO_VERSION}" >> "$GITHUB_ENV"
      - name: Check for dev version
        run: |
          echo ${{ env.REPO_VERSION }}          
          if [[ "${{ env.REPO_VERSION }}" =~ ^[0-9]*\.[0-9]*\.[0-9]*$ ]]; then echo "This seems like an already released version"; false; else echo "looking good"; true; fi
      - name: Bump to stable
        if: ${{ inputs.type == 'stable' }}
        run: |
          uv version --bump stable
          git add pyproject.toml
          git commit -m "Update to stable version: $(uv version --short)"
      - name: get current version
        id: get-version
        run: |
          VERSION=$(uv version --short)
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
      - name: Add tag
        run: git tag v${{ env.VERSION }}
      - name: Push tag
        run: |
          git push
          git push -f --tags

  build-artifact:
    needs: [update-version]
    uses: ./.forgejo/workflows/build-artifact.yml

  build-docker:
    needs: [update-version]
    uses: ./.forgejo/workflows/build-docker.yml
    secrets:
      DOCKER_TESTREPO: ${{ secrets.DOCKER_TESTREPO }} 
      GH_TESTREPO: ${{ secrets.GH_TESTREPO }}
    with:
      type: prerelease

  make_release:
    needs: [update-version, build-artifact, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: check out repo
        uses: actions/checkout@v4
      - run: git tag
      - name: Get tag
        run: |
          VERSION=${{ needs.update-version.outputs.version }}
          echo $VERSION
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: download artifact
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist
      - uses: actions/forgejo-release@v2.12.1
        with:
          direction: upload
          release-notes-assistant: true
          tag: v${{ env.VERSION }}
          release-dir: dist
          prerelease: ${{ inputs.type != 'stable' }}

  bump_to_dev:
    needs: [make_release]
    runs-on: ubuntu-latest
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.19"      
      - name: Bump to dev
        run: |
          uv version --bump patch --bump dev
          git add pyproject.toml
          git commit -m "Update to dev version: $(uv version --short)"
      - name: push
        run: git push




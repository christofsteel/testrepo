name: MyWorkflow

on:
  repository_dispatch:
    types: [test-event]

permissions:
  contents: write
  pull-requests: write

jobs:
  testjob:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{github.event.client_payload.url}}"
      - name: checkout repo
        uses: actions/checkout@v6
      - name: download-artifact
        run: curl ${{ github.event.client_payload.url }} -o yaml.zip
      - name: extract
        run: unzip yaml.zip
      - name: delete zip
        run: rm yaml.zip
      - name: create pr
        uses: peter-evans/create-pull-request@v8


